<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medium Landing Page</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Spectral:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>

<header>

    <div class="container navbar">

        <div class="logo">

            <div class="logo-icon">
                M
            </div>

            <span>edium</span>

        </div>

        <nav>

            <a href="#">Our story</a>
            <a href="#">Membership</a>
            <a href="#">Write</a>
            <a href="#">Sign in</a>

        </nav>

        <button class="get-started">
            Get started
        </button>

    </div>

</header>

<section class="hero">

    <div class="container hero-container">

        <div class="hero-text">

            <h1>
                Human <br>stories 
                & ideas
            </h1>

            <p>
                A place to read, write, and deepen your understanding.
            </p>

            <button class="start-reading">
                Start reading
            </button>

        </div>

        <div class="hero-image">

            <img
                src="images/4_SdjkdS98aKH76I8eD0_qjw.webp"
                alt="Medium Illustration">

        </div>

    </div>

</section>

<footer>

    <div class="container footer-links">

        <a href="#">Help</a>
        <a href="#">Status</a>
        <a href="#">About</a>
        <a href="#">Careers</a>
        <a href="#">Press</a>
        <a href="#">Blog</a>
        <a href="#">Privacy</a>
        <a href="#">Rules</a>
        <a href="#">Terms</a>
        <a href="#">Text to speech</a>

    </div>

</footer>

</body>
</html>
